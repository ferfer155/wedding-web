<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- Gradasi Halus untuk memberikan dimensi elegan pada pakaian -->
    <linearGradient id="hijabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4EAE0" />
    </linearGradient>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5B8A6" />
      <stop offset="100%" stop-color="#D5A28F" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8BB0AF" />
      <stop offset="100%" stop-color="#7CA4A3" />
    </linearGradient>
  </defs>

  <!-- GRUP PASANGAN PENGANTIN (TANPA BAYANGAN BAWAH) -->
  <g id="wedding_couple" transform="translate(20, 20)">
    
    <!-- ==================== MEMPELAI PRIA ==================== -->
    
    <!-- Lengan Kanan Pria (Berada di belakang tangan wanita) -->
    <path d="M 175,145 L 180,220 L 195,225 L 185,135 Z" fill="#668A89" />
    
    <!-- Celana (Warna Khaki/Gold sesuai aksen background) -->
    <path d="M 125,250 L 120,400 L 145,400 L 145,250 Z" fill="#BA9C76" />
    <path d="M 155,250 L 155,400 L 180,400 L 175,250 Z" fill="#BA9C76" />
    
    <!-- Sepatu -->
    <path d="M 115,400 Q 115,385 132.5,385 Q 150,385 150,400 Z" fill="#4A4A4A" />
    <path d="M 150,400 Q 150,385 167.5,385 Q 185,385 185,400 Z" fill="#4A4A4A" />
    
    <!-- Baju Koko/Kemeja (Warna Teal/Hijau Kebiruan) -->
    <path d="M 120,135 Q 150,140 180,135 L 185,260 L 115,260 Z" fill="url(#shirtGrad)" />
    <!-- Garis kancing kemeja -->
    <path d="M 150,135 L 150,190" stroke="#668A89" stroke-width="2" stroke-linecap="round" /> 
    
    <!-- Kerah Kemeja -->
    <rect x="140" y="125" width="20" height="10" rx="3" fill="#668A89" />

    <!-- Leher & Wajah -->
    <rect x="142" y="100" width="16" height="30" fill="#E0BBAA" />
    <ellipse cx="150" cy="90" rx="22" ry="28" fill="#FAD6C6" />
    
    <!-- Rambut & Bayangan Jambang/Janggut -->
    <path d="M 128,90 A 22 25 0 0 1 172 90 A 25 15 0 0 0 128 90 Z" fill="#333333" />
    <path d="M 132,105 Q 150,125 168,105 Q 150,115 132,105 Z" fill="#4A4A4A" opacity="0.8" />
    
    <!-- Lengan Kiri Pria -->
    <path d="M 115,135 L 90,220 L 105,225 L 125,145 Z" fill="#7CA4A3" />
    <!-- Tangan Kiri Pria -->
    <circle cx="97" cy="223" r="8" fill="#FAD6C6" /> 

    <!-- Tangan Kanan Pria (Menggenggam Tangan Wanita di tengah) -->
    <circle cx="188" cy="224" r="8" fill="#FAD6C6" />


    <!-- ==================== MEMPELAI WANITA ==================== -->
    
    <!-- Rok / Bagian Bawah Gaun (Warna Peach/Salem) -->
    <path d="M 220,160 Q 250,150 280,160 L 320,410 Q 250,420 180,410 Z" fill="url(#dressGrad)" />
    
    <!-- Detail Lipatan Gaun -->
    <path d="M 230,160 Q 240,300 200,410 L 220,410 Q 260,300 250,160 Z" fill="#D5A28F" opacity="0.6" />
    <path d="M 270,160 Q 280,300 280,410 L 300,410 Q 300,300 290,160 Z" fill="#D5A28F" opacity="0.6" />

    <!-- Lengan Kiri Wanita (Ke arah tengah menggenggam tangan pria) -->
    <path d="M 230,170 L 200,225 L 190,215 L 220,160 Z" fill="#E5B8A6" />
    <!-- Tangan Kiri Wanita -->
    <circle cx="195" cy="220" r="7" fill="#FAD6C6" />

    <!-- Hijab Bagian Belakang -->
    <path d="M 200,130 C 200,180 220,240 250,260 C 280,240 300,180 300,130 Z" fill="#E8DCD0" />

    <!-- Wajah Wanita (Base) -->
    <ellipse cx="250" cy="110" rx="20" ry="25" fill="#FAD6C6" />

    <!-- Hijab Utama (Menutupi kepala & menjuntai ke bawah) (Warna Krem Arsitektur) -->
    <path d="M 250,60 C 215,60 200,90 200,130 C 200,160 210,210 230,240 C 250,250 270,240 280,210 C 290,160 300,130 300,90 C 300,70 280,60 250,60 Z" fill="url(#hijabGrad)" />
    
    <!-- Lubang Hijab / Layer Wajah Depan -->
    <ellipse cx="250" cy="110" rx="20" ry="25" fill="#FAD6C6" />
    
    <!-- Juntaian Hijab (Menutupi dada dan leher) -->
    <path d="M 232,125 Q 250,140 268,125 L 285,160 Q 280,220 250,250 Q 220,220 215,160 Z" fill="#F4EAE0" />

    <!-- Rona Pipi (Blush on) -->
    <circle cx="238" cy="115" r="4" fill="#E8A598" opacity="0.7" />
    <circle cx="262" cy="115" r="4" fill="#E8A598" opacity="0.7" />

    <!-- Lengan Kanan Wanita (Membawa Bunga di depan dada) -->
    <path d="M 270,165 L 260,205 L 245,195 L 255,160 Z" fill="#E5B8A6" />
    <circle cx="252" cy="200" r="7" fill="#FAD6C6" />

    <!-- Buket Bunga -->
    <g id="bouquet">
      <!-- Tangkai Bunga -->
      <path d="M 252,200 L 230,160 M 252,200 L 240,150 M 252,200 L 265,155" stroke="#7CA4A3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      
      <!-- Daun Bunga -->
      <path d="M 240,175 Q 230,175 235,165 Q 245,165 240,175 Z" fill="#7CA4A3" />
      <path d="M 250,180 Q 260,175 255,165 Q 245,170 250,180 Z" fill="#7CA4A3" />
      
      <!-- Mahkota Bunga (Putih) -->
      <circle cx="230" cy="160" r="7" fill="#FFFFFF" />
      <circle cx="240" cy="150" r="8" fill="#FFFFFF" />
      <circle cx="265" cy="155" r="7" fill="#FFFFFF" />
      <circle cx="250" cy="145" r="6" fill="#FFFFFF" />
      
      <!-- Putik Bunga (Aksen Peach) -->
      <circle cx="230" cy="160" r="2" fill="#E5B8A6" />
      <circle cx="240" cy="150" r="2" fill="#E5B8A6" />
      <circle cx="265" cy="155" r="2" fill="#E5B8A6" />
      <circle cx="250" cy="145" r="2" fill="#E5B8A6" />
    </g>
    
  </g>
</svg>